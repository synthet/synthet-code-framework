name: Project CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Build, lint, and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build
        run: ${BUILD_CMD}

      - name: Lint
        run: ${LINT_CMD}

      - name: Test
        run: ${TEST_CMD}
